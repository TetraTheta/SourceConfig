// GM Custom for GMod v001
exec custom.cfg

// Change Keybinds to match GMod
bind "/" "messagemode2"
bind "ALT" "+zoom"
bind "ENTER" "messagemode"
bind "c" "+menu_context"
bind "q" "+menu"
bind "x" "lastinv"
bind "z" "gmod_undo"
bind "mouse4" "cleanall; i_hate_crouching; i_hate_dropped_weapons; i_hate_battery_and_healthkit;"
bind "mouse5" "sc_remove"
bind "kp_home" "ent_fire !picker unlock; ent_fire !picker open"

// Too much collision shake
collision_shake_amp "0.01"

// Some commands for 0various workshop addons
wshl_hints 0
workshop_autoloader 0

host_writeconfig
